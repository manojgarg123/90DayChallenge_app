<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta-Morph — Mockup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e9e4f7 0%, #e8f7f0 50%, #fdf0e8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* Soft background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 420px; height: 420px;
      background: rgba(167, 139, 250, 0.25);
      top: -120px; right: -120px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: rgba(110, 231, 183, 0.2);
      bottom: -120px; left: -120px;
      animation-delay: 2s;
    }
    .blob-3 {
      width: 500px; height: 500px;
      background: rgba(253, 186, 116, 0.15);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 4s;
    }
    @keyframes pulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* App name */
    .app-name {
      font-size: 3.5rem;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 14px;
      animation: fadeUp 0.5s ease both;
    }
    .app-name span {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Butterfly image */
    .butterfly-wrap {
      margin: 20px auto 20px;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatUp 4s ease-in-out infinite alternate;
    }
    @keyframes floatUp {
      from { transform: translateY(0px);  }
      to   { transform: translateY(-10px); }
    }
    .butterfly-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 32px rgba(124, 58, 237, 0.18));
    }

    /* Tagline */
    .tagline {
      font-size: 1.05rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    /* CTA Button */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: fadeUp 0.5s 0.35s ease both;
      margin-bottom: 20px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.38);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    /* Sign in link */
    .signin {
      font-size: 0.875rem;
      color: #9ca3af;
      animation: fadeUp 0.5s 0.45s ease both;
    }
    .signin a {
      color: #7c3aed;
      font-weight: 600;
      text-decoration: none;
    }
    .signin a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <h1 class="app-name"><span>Meta-Morph</span></h1>

    <div class="butterfly-wrap">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Monarch_In_May.jpg/800px-Monarch_In_May.jpg"
        alt="Monarch butterfly"
        onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Monarch_Butterfly_Danaus_plexippus_Mating_Flickr.jpg/800px-Monarch_Butterfly_Danaus_plexippus_Mating_Flickr.jpg'"
      />
    </div>

    <p class="tagline">Create your better version,<br>one challenge at a time.</p>

    <button class="btn-primary">Metamorph Me</button>

    <p class="signin">
      Already have an account? <a href="#">Sign in</a>
    </p>

  </div>

</body>
</html>
